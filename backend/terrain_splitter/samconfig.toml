version = 0.1

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
stack_name = "terrain-splitter"
resolve_s3 = true
s3_prefix = "terrain-splitter"
region = "us-east-1"
confirm_changeset = true
capabilities = "CAPABILITY_IAM"
parameter_overrides = "StageName=\"prod\" AllowedOrigin=\"*\" RootParallelWorkers=\"6\""
image_repositories = []
